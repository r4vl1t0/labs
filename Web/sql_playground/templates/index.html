<!DOCTYPE html>

<html>

<head>

<title>SQL Playground</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body class="container mt-5">

<h1>SQL Playground</h1>

<p>Execute any SQL query.</p>

<form method="POST">

<textarea
name="query"
class="form-control"
rows="6">{{ query }}</textarea>

<br>

<button class="btn btn-primary">

Execute

</button>

</form>

<br>

{% if error %}

<div class="alert alert-danger">

{{ error }}

</div>

{% endif %}

{% if rows %}

<table class="table table-bordered">

<tr>

{% for c in columns %}

<th>{{ c }}</th>

{% endfor %}

</tr>

{% for row in rows %}

<tr>

{% for col in row %}

<td>{{ col }}</td>

{% endfor %}

</tr>

{% endfor %}

</table>

{% endif %}

</body>

</html>
