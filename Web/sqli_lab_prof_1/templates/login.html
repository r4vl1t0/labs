<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Employee Login</title>

<style>

body{

background:#ececec;
font-family:Arial;

}

.login{

width:350px;

margin:100px auto;

background:white;

padding:30px;

border-radius:8px;

box-shadow:0px 0px 15px rgba(0,0,0,.2);

}

input{

width:100%;

padding:10px;

margin-top:10px;

margin-bottom:20px;

}

button{

width:100%;

padding:10px;

background:#0055aa;

color:white;

border:none;

cursor:pointer;

}

button:hover{

background:#003f80;

}

</style>

</head>

<body>

<div class="login">

<h2>Employee Login</h2>

<form method="POST">

<label>Username</label>

<input type="text" name="username">

<label>Password</label>

<input type="password" name="password">

<button type="submit">

Sign In

</button>

</form>

</div>

</body>

</html>
