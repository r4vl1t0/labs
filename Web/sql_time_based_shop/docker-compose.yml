version: "3.9"

services:

  mysql:
    image: mysql:8.0
    container_name: time-mysql

    environment:
      MYSQL_ROOT_PASSWORD: root

    ports:
      - "3306:3306"

    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  web:
    build: .

    container_name: time-sqli

    ports:
      - "5000:5000"

    depends_on:
      - mysql
